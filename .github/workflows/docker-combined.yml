
name: Build and Push Docker combined Image (autocompose + decomposerize)
on:
  push:
    paths:
      - 'src/autocompose.py'
      - 'docker/autocompose/**'
      - 'docker/decomposerize/**'
      - 'docker/combined/**'
      - '.github/workflows/docker-combined.yml'
  workflow_dispatch:
    inputs:
      amd64:
        description: 'Enable linux/amd64 build'
        type: boolean
        default: true
      armhf:
        description: 'Enable linux/armhf build'
        type: boolean
        default: false
      arm64:
        description: 'Enable linux/arm64 build'
        type: boolean
        default: false

env:
  AMD64: true
  ARMHF: false
  ARM64: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout decomposerize (fork)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/decomposerize
          path: decomposerize
          fetch-depth: 0

      # - name: Debug Yarn v3+ install on runner
      #   working-directory: decomposerize
      #   run: |
      #     corepack enable
      #     corepack prepare yarn@stable --activate
      #     yarn --version
      #     echo "---- ls decomposerize ----"
      #     ls -la
      #     echo "---- package.json ----"
      #     cat package.json
      #     echo "---- yarn.lock head ----"
      #     head -n 40 yarn.lock
      #     echo "---- run immutable install ----"
      #     yarn install --immutable

      - name: Runner debug install and build
        if: 0 == 1
        working-directory: decomposerize
        run: |
          set -o pipefail

          echo "=== show package.json deps referencing packages/decomposerize ==="
          grep -R --line-number '"packages/decomposerize"' || true
          echo "=== find git+ssh or ssh:// in package.json and yarn.lock ==="
          grep -R --line-number -E 'git\+ssh:|ssh://' . || true
          echo "=== find GitHub shorthand user/repo patterns in package.json ==="
          grep -R --line-number -E '"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+"' . || true
          echo "=== show yarn.lock entries that mention git or ssh ==="
          grep -nE 'git@|ssh://' yarn.lock || true

          echo "=== tool versions ==="
          corepack enable
          corepack prepare yarn@1.22.19 --activate
          node --version
          yarn --version
          git --version || true
          ssh -V || true

          echo "=== repo root listing ==="
          ls -la

          echo "=== root package.json ==="
          cat package.json

          echo "=== yarn.lock head ==="
          head -n 40 yarn.lock

          echo "=== run yarn install (frozen) ==="
          if ! yarn install --frozen-lockfile --non-interactive 2>&1 | tee yarn-install.log; then
            echo "yarn install failed; last 200 lines:"
            tail -n 200 yarn-install.log
            grep -o 'p[0-9a-z]\{6\}' yarn-install.log | head -n1 | xargs -r -I{} yarn explain peer-requirements {}
            exit 1
          fi

          echo "=== confirm packages folder and CLI manifest ==="
          ls -la packages || true
          if [ -f packages/decomposerize/package.json ]; then
            echo "packages/decomposerize/package.json:"
            cat packages/decomposerize/package.json
          else
            echo "packages/decomposerize not found"
          fi

          echo "=== run repository build (make build) ==="
          if ! make build 2>&1 | tee make-build.log; then
            echo "make build failed; last 200 lines:"
            tail -n 200 make-build.log
            exit 1
          fi

          echo "=== try local npm global install (deterministic) ==="
          if ! npm install -g ./packages/decomposerize 2>&1 | tee npm-install.log; then
            echo "npm install failed; last 200 lines:"
            tail -n 200 npm-install.log
            ls -la /root/.npm/_logs || true
            exit 1
          fi

          echo "Runner install and build succeeded"

      - name: Set platforms from workflow inputs
        id: platforms
        run: |
          # echo "AMD64=${{ inputs.amd64 || env.AMD64 }}"
          # echo "ARMHF=${{ inputs.armhf || env.ARMHF }}"
          # echo "ARM64=${{ inputs.arm64 || env.ARM64 }}"
          PLATFORMS=""
          [[ ${{ inputs.amd64 || env.AMD64 }} == true ]] && PLATFORMS+="linux/amd64,"
          [[ ${{ inputs.armhf || env.ARMHF }} == true ]] && PLATFORMS+="linux/armhf,"
          [[ ${{ inputs.arm64 || env.ARM64 }} == true ]] && PLATFORMS+="linux/arm64,"
          # Remove trailing comma if present
          PLATFORMS="${PLATFORMS%,}"
          echo "PLATFORMS=$PLATFORMS"
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT

      - name: Call metadata preparation step
        id: metadata
        uses: ./.github/actions/docker-metadata
        with:
          image_name: combined
          platforms: ${{ steps.platforms.outputs.platforms }}

      - name: Set up QEMU
        if: ${{ steps.metadata.outputs.platforms != 'linux/amd64' }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ steps.metadata.outputs.platforms }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ steps.metadata.outputs.buildx_cache }}
          # key: ${{ runner.os }}-buildx-${{ github.sha }}
          key: ${{ runner.os }}-buildx-${{ hashFiles('decomposerize/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.metadata.outputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Composerize CLI image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./docker/combined/Dockerfile
          platforms: ${{ steps.metadata.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ steps.metadata.outputs.title }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.version }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
          cache-from: type=local,src=${{ steps.metadata.outputs.buildx_cache }}
          cache-to: type=local,dest=${{ steps.metadata.outputs.buildx_cache }},mode=max
          build-args: |
            POETRY_VERSION=1.8.2

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
