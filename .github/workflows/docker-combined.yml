
name: Build and Push Docker combined Image (autocompose + decomposerize)
on:
  push:
    paths:
      - 'src/autocompose.py'
      - 'docker/autocompose/**'
      - 'docker/decomposerize/**'
      - 'docker/combined/**'
      - '.github/workflows/docker-combined.yml'
  workflow_dispatch:
    inputs:
      amd64:
        description: 'Enable linux/amd64 build'
        type: boolean
        default: true
      armhf:
        description: 'Enable linux/armhf build'
        type: boolean
        default: false
      arm64:
        description: 'Enable linux/arm64 build'
        type: boolean
        default: false

env:
  AMD64: true
  ARMHF: false
  ARM64: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout decomposerize (fork)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/decomposerize
          path: decomposerize
          fetch-depth: 0

      - name: Debug Yarn install on runner
        working-directory: decomposerize
        run: |
          corepack enable
          corepack prepare yarn@stable --activate
          yarn --version
          echo "---- ls decomposerize ----"
          ls -la
          echo "---- package.json ----"
          cat package.json
          echo "---- yarn.lock head ----"
          head -n 40 yarn.lock
          echo "---- run immutable install ----"
          yarn install --immutable

      - name: Set platforms from workflow inputs
        id: platforms
        run: |
          # echo "AMD64=${{ inputs.amd64 || env.AMD64 }}"
          # echo "ARMHF=${{ inputs.armhf || env.ARMHF }}"
          # echo "ARM64=${{ inputs.arm64 || env.ARM64 }}"
          PLATFORMS=""
          [[ ${{ inputs.amd64 || env.AMD64 }} == true ]] && PLATFORMS+="linux/amd64,"
          [[ ${{ inputs.armhf || env.ARMHF }} == true ]] && PLATFORMS+="linux/armhf,"
          [[ ${{ inputs.arm64 || env.ARM64 }} == true ]] && PLATFORMS+="linux/arm64,"
          # Remove trailing comma if present
          PLATFORMS="${PLATFORMS%,}"
          echo "PLATFORMS=$PLATFORMS"
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT

      - name: Call metadata preparation step
        id: metadata
        uses: ./.github/actions/docker-metadata
        with:
          image_name: combined
          platforms: ${{ steps.platforms.outputs.platforms }}

      - name: Set up QEMU
        if: ${{ steps.metadata.outputs.platforms != 'linux/amd64' }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ steps.metadata.outputs.platforms }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ steps.metadata.outputs.buildx_cache }}
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          # key: ${{ runner.os }}-buildx-${{ hashFiles('decomposerize/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.metadata.outputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Composerize CLI image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./docker/combined/Dockerfile
          platforms: ${{ steps.metadata.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ steps.metadata.outputs.title }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.version }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
          cache-from: type=local,src=${{ steps.metadata.outputs.buildx_cache }}
          cache-to: type=local,dest=${{ steps.metadata.outputs.buildx_cache }},mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
