name: Build and Push Docker combined Image (autocompose + decomposerize)
on:
  push:
    paths:
      - 'docker/combined/**'
      - '.github/workflows/docker-combined.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Container Registry Metadata
        id: prep
        uses: ./.github/actions/docker-metadata
        with:
          image_name: combined

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ steps.prep.outputs.buildx_cache }}
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Composerize CLI image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./docker/combined/Dockerfile
          platforms: ${{ steps.prep.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ steps.prep.outputs.title }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}
            org.opencontainers.image.created=${{ steps.prep.outputs.created }}
          cache-from: type=local,src=${{ steps.prep.outputs.buildx_cache }}
          cache-to: type=local,dest=${{ steps.prep.outputs.buildx_cache }},mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
