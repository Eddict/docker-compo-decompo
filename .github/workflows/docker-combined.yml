
name: Build and Push Docker combined Image (autocompose + decomposerize)
on:
  push:
    paths:
      - 'src/autocompose.py'
      - 'docker/autocompose/**'
      - 'docker/decomposerize/**'
      - 'docker/combined/**'
      - '.github/workflows/docker-combined.yml'
  workflow_dispatch:
    inputs:
      amd64:
        description: 'Enable linux/amd64 build'
        type: boolean
        default: true
      armhf:
        description: 'Enable linux/armhf build'
        type: boolean
        default: false
      arm64:
        description: 'Enable linux/arm64 build'
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set platforms from workflow inputs
        id: platforms
        run: |
          echo "github.event.inputs.amd64: ${{ github.event.inputs.amd64 }}"
          echo "inputs.amd64: ${{ inputs.amd64 }}"
          PLATFORMS="linux/amd64"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PLATFORMS=""
            [[ ${{ inputs.amd64 }} == true ]] && PLATFORMS+="linux/amd64,"
            [[ ${{ inputs.armhf }} == true ]] && PLATFORMS+="linux/armhf,"
            [[ ${{ inputs.arm64 }} == true ]] && PLATFORMS+="linux/arm64,"
          fi
          # Remove trailing comma if present
          PLATFORMS="${PLATFORMS%,}"
          echo "PLATFORMS=$PLATFORMS"
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT

      - name: Call metadata preparation step
        id: metadata
        uses: ./.github/actions/docker-metadata
        with:
          image_name: combined
          platforms: ${{ steps.platforms.outputs.platforms }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ steps.metadata.outputs.buildx_cache }}
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.metadata.outputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Composerize CLI image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./docker/combined/Dockerfile
          platforms: ${{ steps.metadata.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ steps.metadata.outputs.title }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.version }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
          cache-from: type=local,src=${{ steps.metadata.outputs.buildx_cache }}
          cache-to: type=local,dest=${{ steps.metadata.outputs.buildx_cache }},mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
