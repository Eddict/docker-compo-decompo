name: Build and Push Docker compo-decompo Image (autocompose + decomposerize)
on:
  push:
    paths:
      - 'src/autocompose.py'
      - 'docker/autocompose/**'
      - 'docker/decomposerize/**'
      - 'docker/compo-decompo/**'
      - '.github/workflows/docker-compo-decompo.yml'
  workflow_dispatch:
    inputs:
      amd64:
        description: 'Enable linux/amd64 build'
        type: boolean
        default: true
      armhf:
        description: 'Enable linux/armhf build'
        type: boolean
        default: false
      arm64:
        description: 'Enable linux/arm64 build'
        type: boolean
        default: false

env:
  AMD64: true
  ARMHF: false
  ARM64: false
  # https://docs.docker.com/build/building/variables/#buildkit_colors
  BUILDKIT_COLORS: "run=123,20,245:error=yellow:cancel=blue:warning=white"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     platform: [linux/amd64, linux/armhf, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout decomposerize (fork)
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/decomposerize
          path: decomposerize
          fetch-depth: 0

      - name: Call metadata preparation step
        id: metadata
        uses: ./.github/actions/docker-metadata
        with:
          image_name: docker-compo-decompo
          linux_amd64: ${{ inputs.amd64 || env.AMD64 }}
          linux_armhf: ${{ inputs.armhf || env.ARMHF }}
          linux_arm64: ${{ inputs.arm64 || env.ARM64 }}

      - name: Set up QEMU
        if: ${{ steps.metadata.outputs.platforms != 'linux/amd64' }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ steps.metadata.outputs.platforms }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: ${{ steps.metadata.outputs.buildx_cache }}
          # key: ${{ runner.os }}-buildx-${{ github.sha }}
          key: ${{ runner.os }}-buildx-${{ hashFiles('decomposerize/yarn.lock', 'poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.metadata.outputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Composerize CLI image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./docker/compo-decompo/Dockerfile
          platforms: ${{ steps.metadata.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ steps.metadata.outputs.title }}
            org.opencontainers.image.version=${{ steps.metadata.outputs.version }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
          cache-from: type=local,src=${{ steps.metadata.outputs.buildx_cache }}
          cache-to: type=local,dest=${{ steps.metadata.outputs.buildx_cache }},mode=max
          build-args: |
            POETRY_VERSION=1.8.5

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
