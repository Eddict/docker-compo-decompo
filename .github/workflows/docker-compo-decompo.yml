name: Build and push Docker compo-decompo image
on:
  push:
    paths:
      - 'src/autocompose.py'
      - 'docker/autocompose/**'
      - 'docker/decomposerize/**'
      - 'docker/compo-decompo/**'
      - '.github/workflows/docker-compo-decompo.yml'
      - '.github/workflows/docker-build-template.yml'
  workflow_dispatch:
    inputs:
      amd64:
        description: 'Enable linux/amd64 build'
        type: boolean
        default: true
      armhf:
        description: 'Enable linux/armhf build'
        type: boolean
        default: false
      arm64:
        description: 'Enable linux/arm64 build'
        type: boolean
        default: false

jobs:
  init:
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     platform: [linux/amd64, linux/armhf, linux/arm64]
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            ./.github/workflows/docker-build-template.yml
          sparse-checkout-cone-mode: false

  build-and-push:
    needs: init
    uses: ./.github/workflows/docker-build-template.yml
    with:
      extra_checkout: true
      amd64: ${{ inputs.amd64 || true }}
      armhf: ${{ inputs.armhf || false }}
      arm64: ${{ inputs.arm64 || false }}
      image_name: docker-compo-decompo
      dockerfile: ./docker/compo-decompo/Dockerfile
      build_args: POETRY_VERSION=1.8.5
    secrets:
      CR_PAT: ${{ secrets.CR_PAT }}
