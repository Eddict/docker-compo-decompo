name: Build and push Docker compo-decompo image
on:
  push:
    paths:
      - 'src/autocompose.py'
      - 'docker/autocompose/**'
      - 'docker/decomposerize/**'
      - 'docker/compo-decompo/**'
      - '.github/workflows/docker-compo-decompo.yml'
      - '.github/workflows/docker-build-template.yml'
  workflow_dispatch:
    inputs:
      amd64:
        description: 'Enable linux/amd64 build'
        type: boolean
        default: true
      armhf:
        description: 'Enable linux/armhf build'
        type: boolean
        default: false
      arm64:
        description: 'Enable linux/arm64 build'
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     platform: [linux/amd64, linux/armhf, linux/arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout decomposerize (fork)
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/decomposerize
          path: decomposerize
          fetch-depth: 0

        # Call the reusable workflow (template)
      - name: Build and push Docker image
        uses: ./.github/workflows/docker-build-template.yml
        with:
          amd64: ${{ inputs.amd64 }}
          armhf: ${{ inputs.armhf }}
          arm64: ${{ inputs.arm64 }}
          image_name: docker-compo-decompo
          dockerfile: ./docker/compo-decompo/Dockerfile
          build-args: POETRY_VERSION=1.8.5
          cache_key: ${{ runner.os }}-buildx-${{ hashFiles('decomposerize/yarn.lock', 'poetry.lock') }}
