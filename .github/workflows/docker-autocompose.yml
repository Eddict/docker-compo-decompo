name: Build and Push Docker autocompose Image
on:
  push:
    paths:
      - 'src/autocompose.py'
      - 'docker/autocompose/**'
      - '.github/workflows/docker-autocompose.yml'
      - 'pyproject.toml'
      - 'README.md'
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:


jobs:
  cr_build:
    name: Build and Push to Container Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Container Registry Metadata
        id: prep
        uses: ./.github/actions/docker-metadata
        with:
          image_name: autocompose

      - name: Set up QEMU
        if: ${{ steps.prep.outputs.platforms != 'linux/amd64' }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ steps.prep.outputs.platforms }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: ${{ steps.prep.outputs.buildx_cache }}
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push to Container Registry
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./docker/autocompose/Dockerfile
          platforms: ${{ steps.prep.outputs.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.prep.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ steps.prep.outputs.title }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}
            org.opencontainers.image.created=${{ steps.prep.outputs.created }}
          cache-from: type=local,src=${{ steps.prep.outputs.buildx_cache }}
          cache-to: type=local,dest=${{ steps.prep.outputs.buildx_cache }},mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
